<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSnap ChatBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A premium weather chatbot providing real-time weather updates and forecasts.">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">
                <span class="icon">☁️</span>
                <h1>WeatherSnap</h1>
            </div>
            <div class="status-indicator">
                <span class="dot"></span> Online
            </div>
        </header>

        <main class="chat-container" id="chat-container">
            <div class="message bot-message">
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <p>Hello! I'm your WeatherSnap assistant. Ask me about the weather in any location!</p>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <form id="chat-form" class="chat-form">
                <input type="text" id="user-input" placeholder="Type a location (e.g., Delhi, Mumbai)..." autocomplete="off" required>
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
